// Quantum bit catching mini-game  
async function quantumGame(){  
    await typing("[MINI-GAME] Catch 5 quantum bits to decrypt", 8, "#ff0");  
    let caught = 0;  
    const gameInterval = setInterval(()=>{  
        if(caught >= 5){  
            clearInterval(gameInterval);  
            return;  
        }  
        const bit = document.createElement('div');  
        bit.className = 'bit';  
        bit.textContent = Math.random() > 0.5? '1' : '0';  
        bit.style.left = Math.random()*(window.innerWidth-50) + 'px';  
        bit.style.animationDuration = (3+Math.random()*2) + 's';  
        bit.onclick = ()=>{  
            caught++;  
            bit.remove();  
            if(caught >= 5) clearInterval(gameInterval);  
        };  
        document.body.appendChild(bit);  
        setTimeout(()=>bit.remove(), 5000);  
    }, 800);  
    while(caught < 5) await sleep(100);  
    await typing("[SUCCESS] Quantum decryption complete", 8, "#0f0");  
}

                await typing("Available commands: help, scan, nuke, clear, exit, prank, ai", 8, "#0ff");

                await progressBar("", 25, 18);

                await typing("Are you sure? Type 'yes' to confirm", 8, "#f00");  
            }else if(cmd === 'clear'){  
                container.innerHTML = '';
