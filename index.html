<style>
body{
    background:black;
    color:#0f0;
    font-family:monospace;
    text-align:center;
    margin:0;
    padding:20px;
    overflow:hidden;
}
canvas#matrixBg{
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    z-index:0; opacity:0.5;
}
body::after{
    content:""; position:fixed; top:0; left:0;
    width:100%; height:100%;
    background:repeating-linear-gradient(
        transparent, transparent 2px,
        rgba(0,255,0,0.04) 3px
    );
    pointer-events:none; z-index:1;
    animation:scanline 8s linear infinite;
}
@keyframes scanline{
    0%{transform:translateY(0);}
    100%{transform:translateY(100vh);}
}
.content{
    position:relative; z-index:2;
    animation:flicker 0.15s infinite;
}
@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:0.97;}
}
.glitch{
    animation:glitchAnim 0.3s;
}
@keyframes glitchAnim{
    0%{transform:translate(0);}
    20%{transform:translate(-2px,2px);}
    40%{transform:translate(2px,-2px);}
    60%{transform:translate(-2px,-2px);}
    80%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}
.flash{
    animation:flashRed 0.5s;
}
@keyframes flashRed{
    0%,100%{background:black;}
    50%{background:rgba(255,0,0,0.2);}
}
.one{ color:red; }
#matrixBtn{
    background:black; color:#0f0;
    border:2px solid #0f0; padding:15px 30px;
    font-size:20px; cursor:pointer;
    box-shadow:0 0 10px #0f0, 0 0 20px #0f0;
    transition: box-shadow 0.3s; margin-bottom:20px;
}
#matrixBtn:hover{ box-shadow:0 0 20px #0f0, 0 0 40px #0f0; }
#matrixContainer{
    background:rgba(0,0,0,0.9); color:#0f0;
    font-family:monospace; white-space:pre-wrap;
    display:none; padding:15px; height:90vh;
    width:95%; max-width:900px; overflow:auto;
    box-sizing:border-box; border:1px solid #0f0;
    margin:auto; text-align:left;
    box-shadow:0 0 40px rgba(0,255,0,0.4);
}
.choiceBtn{
    background:black; color:#0f0;
    border:2px solid #0f0; padding:12px 25px;
    margin:10px; font-family:monospace;
    cursor:pointer; box-shadow:0 0 10px #0f0;
    font-size:18px;
}
.choiceBtn:hover{ box-shadow:0 0 20px #0f0, 0 0 40px #0f0; }
@keyframes glow{
    from{transform:scale(1); opacity:.8;}
    to{transform:scale(1.05); opacity:1;}
}
.packet{
    position:fixed; color:#0ff; font-size:12px;
    pointer-events:none; z-index:3;
    animation:fly 3s linear;
}
@keyframes fly{
    from{transform:translateX(-100px); opacity:1;}
    to{transform:translateX(100vw); opacity:0;}
}
</style>
</head>
<body>
<canvas id="matrixBg"></canvas>
<div class="content">
<p>WANNA GET <span class="one">HACKED</span>?<br>TRY CLICKING THE BELOW BUTTON</p>

<script>
const canvas = document.getElementById("matrixBg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
const fontSize = 14;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix(){
    ctx.fillStyle = "rgba(0,0,0,0.04)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0f0";
    ctx.font = fontSize + "px monospace";
    for(let i=0; i<drops.length; i++){
        const text = chars[Math.floor(Math.random()*chars.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 30);

window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = Array(columns).fill(1);
});

function spawnPacket(){
    const p = document.createElement("div");
    p.className = "packet";
    p.textContent = `[DATA:${Math.random().toString(16).substr(2,8).toUpperCase()}]`;
    p.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 3000);
}
setInterval(spawnPacket, 400);

const container = document.getElementById("matrixContainer");
const btn = document.getElementById("matrixBtn");
const typeSound = document.getElementById("typeSound");
const beepSound = document.getElementById("beepSound");
const CHARS = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*";
const bgMusic = new Audio("funk_abnormal.mp3");
bgMusic.loop = true; bgMusic.volume = 0.3;

function color(text, col){ return `<span style="color:${col}">${text}</span>`; }
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
function scrollDown(){ container.scrollTop = container.scrollHeight; }

async function typing(text, delay=25, col="#0f0"){
    let line = document.createElement("div");
    line.style.color = col;
    line.style.whiteSpace = "pre-wrap";
    container.appendChild(line);
    for(let char of text){
        line.textContent += char;
        typeSound.currentTime = 0;
        typeSound.play().catch(()=>{});
        scrollDown();
        await sleep(delay);
    }
    container.innerHTML += "<br>";
}

async function matrixRain(lines=50, speed=20){
    const width = Math.min(Math.floor(window.innerWidth/10), 120);
    for(let i=0; i<lines; i++){
        let line = "";
        for(let j=0; j<width; j++){
            line += CHARS[Math.floor(Math.random()*CHARS.length)];
        }
        container.innerHTML += color(line, Math.random()>.5? "#0f0" : "#0a0") + "<br>";
        scrollDown();
        await sleep(speed);
    }
}

async function progressBar(label, steps=25, delay=60){
    await typing(label, 20, "#0f0");
    let barLine = document.createElement("div");
    barLine.style.margin = "10px 0";
    container.appendChild(barLine);
    for(let i=0; i<=steps; i++){
        const bar = "█".repeat(i) + "░".repeat(steps-i);
        const percent = Math.floor(i*100/steps);
        barLine.innerHTML = `<span style="color:cyan">[</span><span style="color:#0f0">${bar}</span><span style="color:cyan">]</span> ${percent}%`;
        scrollDown();
        await sleep(delay);
    }
    container.innerHTML += "<br>";
}

function randomIP(){
    return `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
}

async function runMatrix(){
    bgMusic.play().catch(()=>{});
    btn.style.display = "none";
    container.style.display = "block";
    container.innerHTML = "";

    await typing(`[SCAN] Target acquired: ${randomIP()}`, 15, "#0ff");
    await typing(`[PING] Response: 12ms`, 15, "#0ff");
    await typing(`[PORT] 22,80,443 open`, 15, "#0ff");
    await sleep(300);

    await typing("MATRIX PROTOCOL INITIATED...", 35, "#0f0");
    await sleep(400);
    await matrixRain(50, 20);
    await progressBar("Establishing connection...");
    await progressBar("Bypassing encryption...");
    await progressBar("Escalating privileges...");
    await progressBar("Injecting payload...");

    document.body.classList.add("flash", "glitch");
    beepSound.play().catch(()=>{});
    await typing("SYSTEM COMPROMISED", 25, "red");
    await sleep(800);
    document.body.classList.remove("flash", "glitch");

    container.innerHTML += color("JUST PRANKING 😎<br>AFEEF TRY RATING THIS OUT OF 10", "yellow") + "<br><br>";
    container.innerHTML += `<button id="eidBtn" class="choiceBtn">▶ ACCESS SECRET MESSAGE</button>`;
    scrollDown();

    document.getElementById("eidBtn").onclick = async function(){
        this.style.display = "none";
        let eidLine = document.createElement("div");
        eidLine.style.color = "#00ff00";
        eidLine.style.fontSize = "45px";
        eidLine.style.fontWeight = "bold";
        eidLine.style.textAlign = "center";
        eidLine.style.marginTop = "25px";
        eidLine.style.textShadow = `0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 40px #00ff00`;
        eidLine.style.animation = "glow 1s infinite alternate";
        container.appendChild(eidLine);

        const eidText = "EID MUBARAK MY DEAR AFEEF HASSIM";
        for(let char of eidText){
            eidLine.innerHTML += char;
            scrollDown();
            await sleep(50);
        }

        container.innerHTML += "<br><br>";
        await typing("• Afeef, I failed to protect the trust you gave me, and I deeply regret it 💚", 30, "#00ff00");

        container.innerHTML += `<br><button id="okBtn" class="choiceBtn">Trust Restored 💚</button><button id="forgiveBtn" class="choiceBtn">Not Ready Yet 🌙</button>`;
        scrollDown();

        document.getElementById("okBtn").onclick = async function(){
            this.style.display = "none";
            document.getElementById("forgiveBtn").style.display = "none";
            await typing("Thank you, Afeef 💚\nI'll value your trust more carefully from now on 🕊️", 30, "#00ff00");
        };

        document.getElementById("forgiveBtn").onclick = async function(){
            this.style.display = "none";
            document.getElementById("okBtn").style.display = "none";
            await typing("I understand 💚\nI'll respect your space and hope time brings healing 🌿", 30, "#00ff00");
        };
    };
}
btn.onclick = runMatrix;
</script>
</body>
</html>
